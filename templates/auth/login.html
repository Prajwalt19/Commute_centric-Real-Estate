{% extends 'base.html' %}
{% block title %}Login — NestFind{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--sand);">
  <div style="background:white;border-radius:24px;padding:3rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(26,20,18,0.12);">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">⌂</div>
      <h2>Welcome Back</h2>
      <p style="color:var(--muted);margin-top:.3rem;">Sign in to your NestFind account</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-terra w-100" style="justify-content:center;margin-top:.5rem;">Sign In</button>
    </form>
    <div class="divider"></div>
    <p style="text-align:center;color:var(--muted);font-size:.9rem;">Don't have an account? <a href="/register">Register here</a></p>
  </div>
</div>
{% endblock %}
