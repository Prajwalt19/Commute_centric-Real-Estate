{% extends 'base.html' %}
{% block title %}Register — NestFind{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--sand);">
  <div style="background:white;border-radius:24px;padding:3rem;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(26,20,18,0.12);">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">⌂</div>
      <h2>Create Account</h2>
      <p style="color:var(--muted);margin-top:.3rem;">Join NestFind and find your perfect rental</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">I am a...</label>
        <select name="role" class="form-control">
          <option value="tenant">Tenant (Looking for a property)</option>
          <option value="owner">Property Owner (Want to list)</option>
        </select>
      </div>
      <button type="submit" class="btn btn-terra w-100" style="justify-content:center;margin-top:.5rem;">Create Account</button>
    </form>
    <div class="divider"></div>
    <p style="text-align:center;color:var(--muted);font-size:.9rem;">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
{% endblock %}
