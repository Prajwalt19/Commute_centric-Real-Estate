{% extends 'base.html' %}
{% block content %}
<div class="admin-layout">
  <nav class="admin-sidebar">
    <div style="padding:1.5rem;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:.5rem;">
      <div style="color:white;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;">⌂ Admin Panel</div>
    </div>
    <div class="admin-nav-label">Main</div>
    <a href="/admin/dashboard" class="admin-nav-link {% if request.path=='/admin/dashboard' %}active{% endif %}"><i class="fas fa-tachometer-alt" style="width:18px;"></i> Dashboard</a>
    <a href="/admin/properties" class="admin-nav-link {% if request.path=='/admin/properties' %}active{% endif %}"><i class="fas fa-building" style="width:18px;"></i> Properties</a>
    <a href="/admin/users" class="admin-nav-link {% if request.path=='/admin/users' %}active{% endif %}"><i class="fas fa-users" style="width:18px;"></i> Users</a>
    <a href="/admin/analytics" class="admin-nav-link {% if request.path=='/admin/analytics' %}active{% endif %}"><i class="fas fa-chart-bar" style="width:18px;"></i> Analytics</a>
    <div class="admin-nav-label" style="margin-top:1rem;">Account</div>
    <a href="/" class="admin-nav-link"><i class="fas fa-home" style="width:18px;"></i> Back to Site</a>
    <a href="/logout" class="admin-nav-link"><i class="fas fa-sign-out-alt" style="width:18px;"></i> Logout</a>
  </nav>
  <div class="admin-content">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
